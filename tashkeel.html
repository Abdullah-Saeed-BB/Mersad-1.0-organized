<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تَشْكِيل</title>

  <style>
    @font-face {
      font-family: 'ThmanyahSans';
      src: url('fonts/thmanyahsansLight.otf') format('opentype');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ThmanyahSans';
      src: url('fonts/thmanyahsansRegular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ThmanyahSans';
      src: url('fonts/thmanyahsansMedium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ThmanyahSans';
      src: url('fonts/thmanyahsansBold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ThmanyahSerifDisplay';
      src: url('fonts/thmanyahserifdisplayRegular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ThmanyahSerifDisplay';
      src: url('fonts/thmanyahserifdisplayMedium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'ThmanyahSerifDisplay';
      src: url('fonts/thmanyahserifdisplayBold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000;
      --white: #fff;
      --gray-100: #f5f5f5;
      --gray-200: #e8e8e8;
      --gray-400: #aaa;
      --gray-600: #555;
      --font-ui: 'ThmanyahSans', -apple-system, 'Geeza Pro', 'Arabic UI Text', Arial, sans-serif;
      --font-text: 'ThmanyahSerifDisplay', 'ThmanyahSans', 'Geeza Pro', serif;
    }

    html, body {
      height: 100%;
      background: var(--white);
      color: var(--black);
      font-family: var(--font-ui);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--black);
      padding: 20px 32px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      font-family: var(--font-text);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo span {
      font-weight: 300;
      font-size: 14px;
      color: var(--gray-600);
      margin-right: 10px;
    }

    .settings-btn {
      background: none;
      border: 1px solid var(--gray-200);
      color: var(--gray-600);
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 6px;
      font-family: var(--font-ui);
      font-size: 13px;
      transition: border-color 0.15s, color 0.15s;
    }
    .settings-btn:hover {
      border-color: var(--black);
      color: var(--black);
    }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - 65px);
    }

    /* ── Pane ── */
    .pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane + .pane {
      border-right: 1px solid var(--black);
    }

    .pane-header {
      padding: 14px 28px;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 50px;
    }

    .pane-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--gray-600);
      text-transform: uppercase;
    }

    .pane-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .char-count {
      font-size: 12px;
      color: var(--gray-400);
    }

    /* ── Textarea ── */
    .input-area {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font-ui);
      font-size: 22px;
      font-weight: 400;
      line-height: 1.9;
      color: var(--black);
      background: var(--white);
      padding: 32px 28px;
      direction: rtl;
      text-align: right;
    }

    .input-area::placeholder {
      color: var(--gray-400);
    }

    /* ── Output ── */
    .output-area {
      flex: 1;
      padding: 32px 28px;
      overflow-y: auto;
      direction: rtl;
      text-align: right;
    }

    .output-text {
      font-family: var(--font-text);
      font-size: 26px;
      font-weight: 500;
      line-height: 2.4;
      color: var(--black);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .output-empty {
      font-size: 15px;
      color: var(--gray-400);
      font-weight: 400;
      line-height: 1.8;
    }

    /* Loading state */
    .loading-dots {
      display: inline-flex;
      gap: 5px;
      align-items: center;
    }
    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--black);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      border-top: 1px solid var(--black);
      padding: 16px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--white);
    }

    .tashkeel-btn {
      background: var(--black);
      color: var(--white);
      border: none;
      cursor: pointer;
      padding: 12px 36px;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: opacity 0.15s;
    }
    .tashkeel-btn:hover:not(:disabled) { opacity: 0.75; }
    .tashkeel-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--gray-200);
      color: var(--black);
      cursor: pointer;
      padding: 12px 24px;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 400;
      transition: border-color 0.15s, background 0.15s;
    }
    .copy-btn:hover:not(:disabled) {
      border-color: var(--black);
      background: var(--gray-100);
    }
    .copy-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .bottom-left { display: flex; gap: 10px; }

    .error-msg {
      font-size: 13px;
      color: #c00;
      max-width: 400px;
      text-align: center;
    }

    /* ── Settings modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--white);
      border: 1px solid var(--black);
      border-radius: 12px;
      padding: 36px;
      width: min(480px, 90vw);
    }

    .modal h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .modal p {
      font-size: 13px;
      color: var(--gray-600);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .modal label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray-600);
      margin-bottom: 8px;
    }

    .modal input[type="password"],
    .modal input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      font-size: 14px;
      font-family: monospace;
      direction: ltr;
      text-align: left;
      outline: none;
      transition: border-color 0.15s;
      background: var(--white);
    }
    .modal input:focus { border-color: var(--black); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      justify-content: flex-start;
    }

    .btn-save {
      background: var(--black);
      color: var(--white);
      border: none;
      cursor: pointer;
      padding: 11px 28px;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 500;
    }
    .btn-save:hover { opacity: 0.75; }

    .btn-cancel {
      background: none;
      border: 1px solid var(--gray-200);
      color: var(--black);
      cursor: pointer;
      padding: 11px 20px;
      border-radius: 8px;
      font-family: var(--font-ui);
      font-size: 14px;
    }
    .btn-cancel:hover { border-color: var(--black); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--black);
      color: var(--white);
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-family: var(--font-ui);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 200;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
        height: auto;
        min-height: calc(100vh - 65px);
      }
      .pane + .pane {
        border-right: none;
        border-top: 1px solid var(--black);
      }
      header { padding: 16px 20px; }
      .bottom-bar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    تَشْكِيل
    <span>أداة التشكيل الآلي</span>
  </div>
  <button class="settings-btn" onclick="openSettings()">مفتاح API</button>
</header>

<main>
  <!-- Right pane: output -->
  <div class="pane" id="output-pane">
    <div class="pane-header">
      <span class="pane-label">النص المُشَكَّل</span>
      <div class="pane-actions">
        <span class="char-count" id="output-count"></span>
      </div>
    </div>
    <div class="output-area" id="output-area">
      <div class="output-empty" id="output-placeholder">
        النص المُشَكَّل يظهر هنا<br>
        <span style="color: var(--gray-400); font-size: 13px;">اكتب نصاً في اليسار ثم اضغط «شكِّل»</span>
      </div>
      <div class="output-text" id="output-text" style="display:none;"></div>
    </div>
  </div>

  <!-- Left pane: input -->
  <div class="pane" id="input-pane">
    <div class="pane-header">
      <span class="pane-label">النص الأصلي</span>
      <div class="pane-actions">
        <span class="char-count" id="input-count">0</span>
      </div>
    </div>
    <textarea
      class="input-area"
      id="input-area"
      placeholder="اكتب أو الصق نصاً عربياً هنا…"
      spellcheck="false"
    ></textarea>
  </div>
</main>

<div class="bottom-bar">
  <div class="bottom-left">
    <button class="tashkeel-btn" id="tashkeel-btn" onclick="doDiacritize()">شكِّل</button>
    <button class="copy-btn" id="copy-btn" onclick="copyResult()" disabled>نسخ النتيجة</button>
  </div>
  <div class="error-msg" id="error-msg"></div>
</div>

<!-- Settings modal -->
<div class="modal-backdrop" id="settings-modal" onclick="closeIfBackdrop(event)">
  <div class="modal">
    <h2>إعدادات API</h2>
    <p>
      يستخدم هذا التطبيق Claude API من Anthropic لتحليل النصوص العربية وتشكيلها.
      احصل على مفتاحك من <span style="direction:ltr;display:inline-block;">console.anthropic.com</span>
    </p>
    <label for="api-key-input">مفتاح Anthropic API</label>
    <input type="password" id="api-key-input" placeholder="sk-ant-api03-…" autocomplete="off">
    <div class="modal-actions">
      <button class="btn-save" onclick="saveKey()">حفظ</button>
      <button class="btn-cancel" onclick="closeSettings()">إلغاء</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'tashkeel_api_key';
  const MODEL = 'claude-haiku-4-5-20251001';

  const SYSTEM_PROMPT = `أنت خبير في اللغة العربية والنحو والصرف. مهمتك الوحيدة هي إضافة التشكيل الكامل (الحركات والتنوين والشدة) على النصوص العربية.

قواعد صارمة:
- أعد كتابة النص مع تشكيل كامل ودقيق لكل كلمة
- حلّل البنية النحوية (مبتدأ، خبر، فاعل، مفعول به، مضاف، مضاف إليه) لتحديد الحركة الصحيحة
- لا تحذف أي كلمة ولا تضف أي كلمة
- لا تضف أي شرح أو تعليق أو ترقيم إضافي
- أعد النص المُشَكَّل فقط، لا شيء غيره`;

  let currentResult = '';
  let isLoading = false;

  // Count chars
  const inputEl = document.getElementById('input-area');
  const inputCount = document.getElementById('input-count');
  inputEl.addEventListener('input', () => {
    const len = inputEl.value.length;
    inputCount.textContent = len;
  });

  async function doDiacritize() {
    const text = inputEl.value.trim();
    if (!text) return;

    const apiKey = localStorage.getItem(STORAGE_KEY);
    if (!apiKey) {
      openSettings();
      showError('أدخل مفتاح API أولاً');
      return;
    }

    setLoading(true);
    showError('');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-calls': 'true'
        },
        body: JSON.stringify({
          model: MODEL,
          max_tokens: 4096,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: text }]
        })
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message || `خطأ ${response.status}`;
        throw new Error(msg);
      }

      const data = await response.json();
      const result = data?.content?.[0]?.text?.trim() || '';
      if (!result) throw new Error('لم تصل نتيجة من الخادم');

      currentResult = result;
      showResult(result);

    } catch (e) {
      showError(e.message || 'حدث خطأ غير متوقع');
    } finally {
      setLoading(false);
    }
  }

  function showResult(text) {
    const placeholder = document.getElementById('output-placeholder');
    const outputText = document.getElementById('output-text');
    const outputCount = document.getElementById('output-count');
    const copyBtn = document.getElementById('copy-btn');

    placeholder.style.display = 'none';
    outputText.style.display = 'block';
    outputText.textContent = text;
    outputCount.textContent = text.length;
    copyBtn.disabled = false;
  }

  function setLoading(state) {
    isLoading = state;
    const btn = document.getElementById('tashkeel-btn');
    const outputText = document.getElementById('output-text');
    const placeholder = document.getElementById('output-placeholder');

    if (state) {
      btn.disabled = true;
      btn.textContent = '…';
      placeholder.style.display = 'flex';
      placeholder.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;
      outputText.style.display = 'none';
    } else {
      btn.disabled = false;
      btn.textContent = 'شكِّل';
    }
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
  }

  function copyResult() {
    if (!currentResult) return;
    navigator.clipboard.writeText(currentResult).then(() => showToast('تم النسخ'));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Settings
  function openSettings() {
    const modal = document.getElementById('settings-modal');
    const input = document.getElementById('api-key-input');
    input.value = localStorage.getItem(STORAGE_KEY) || '';
    modal.classList.add('open');
    setTimeout(() => input.focus(), 50);
  }

  function closeSettings() {
    document.getElementById('settings-modal').classList.remove('open');
  }

  function closeIfBackdrop(e) {
    if (e.target === document.getElementById('settings-modal')) closeSettings();
  }

  function saveKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (val) {
      localStorage.setItem(STORAGE_KEY, val);
      showToast('تم حفظ المفتاح');
    } else {
      localStorage.removeItem(STORAGE_KEY);
      showToast('تم حذف المفتاح');
    }
    closeSettings();
  }

  // Keyboard shortcut: Cmd/Ctrl + Enter to diacritize
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      if (!isLoading) doDiacritize();
    }
    if (e.key === 'Escape') closeSettings();
  });

  // Open settings on first load if no key
  window.addEventListener('load', () => {
    if (!localStorage.getItem(STORAGE_KEY)) {
      setTimeout(openSettings, 300);
    }
  });
</script>

</body>
</html>
